<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
</head>

<body>
    <main class="signup">

        <div class="signup__container">
            <h1 class="signup__welcome">
                Begin Your Adventure

            </h1>
            <p class="signup__description">
                Ready for Player One? Sign up to start your journey, earn achievements, and dominate the leaderboard

            </p>

            <h2 class="signup__title"> SIGN UP </h2>

            <form class="signup__form">

                <div class="signup__feild">
                    <input type="text" required placeholder="Full Name">
                </div>


                <div class="signup__feild">
                    <input type="text" required placeholder="username">
                </div>


                <div class="signup__feild">
                    <input type="email" required placeholder="name@example.com">
                </div>


                <div class="signup__feild">
                    <input type="password" required placeholder="Create a strong password">
                </div>


                <div class="signup__feild">
                    <input type="password" required placeholder="Verify your secret key">
                </div>

                <div class="signup__feild signup__feild--checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the Terms of War and Privacy Policy</label>
                </div>

                <div class="signup__feild">
                    <button type="submit" class="signup__button">Spawn Now!</button>

                </div>

                <div class="signup__login-link">
                    <p class="signup__text">
                        Already a member?
                        <a href="login.html" class="signup__link">Sign In</a>
                    </p>
                </div>

            </form>

        </div>

    </main>
</body>

</html>
